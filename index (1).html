<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JG">
<meta name="theme-color" content="#0f0f0f">
<title>JG</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #171717;
    --border: #2a2a2a;
    --border-hover: #444;
    --text: #f0ede8;
    --sub: #888;
    --dim: #555;
    --accent: #c8b89a;
    --accent-dim: rgba(200,184,154,0.12);
    --green: #4caf7d;
    --blue: #5b9bd5;
    --amber: #d4933a;
    --rose: #c46b6b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overscroll-behavior: none;
  }

  /* ── GRAIN OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .shell {
    position: relative;
    z-index: 1;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }

  /* ── HEADER ── */
  header {
    padding: 52px 32px 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .monogram {
    font-family: 'Cormorant', serif;
    font-size: 72px;
    font-weight: 300;
    line-height: 1;
    color: var(--text);
    letter-spacing: -2px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.1s forwards;
  }

  .header-right {
    text-align: right;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.2s forwards;
  }

  .date-line {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    line-height: 1.8;
  }

  .tagline {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }

  /* ── DIVIDER ── */
  .rule {
    margin: 28px 32px 0;
    height: 1px;
    background: var(--border);
    opacity: 0;
    animation: fadeIn 0.5s ease 0.35s forwards;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    padding: 24px 32px 16px;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.4s forwards;
  }

  /* ── APP GRID ── */
  .app-grid {
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    flex: 1;
  }

  @media (min-width: 600px) {
    .app-grid { grid-template-columns: repeat(3, 1fr); padding: 0 32px; }
  }
  @media (min-width: 900px) {
    .app-grid { grid-template-columns: repeat(4, 1fr); }
  }

  /* ── APP TILE ── */
  .app-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 20px 20px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: border-color 0.2s, transform 0.15s, background 0.2s;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
    position: relative;
    overflow: hidden;
  }

  .app-tile::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    opacity: 0;
    transition: opacity 0.2s;
    background: radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.04), transparent 70%);
  }

  .app-tile:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
    background: #1c1c1c;
  }
  .app-tile:hover::after { opacity: 1; }
  .app-tile:active { transform: scale(0.97); }

  /* staggered animation delays */
  .app-tile:nth-child(1) { animation-delay: 0.45s; }
  .app-tile:nth-child(2) { animation-delay: 0.52s; }
  .app-tile:nth-child(3) { animation-delay: 0.59s; }
  .app-tile:nth-child(4) { animation-delay: 0.66s; }
  .app-tile:nth-child(5) { animation-delay: 0.73s; }
  .app-tile:nth-child(6) { animation-delay: 0.80s; }
  .app-tile:nth-child(7) { animation-delay: 0.87s; }
  .app-tile:nth-child(8) { animation-delay: 0.94s; }

  /* placeholder "add" tile */
  .app-tile.add-tile {
    border-style: dashed;
    border-color: var(--dim);
    opacity: 0;
    animation: fadeUp 0.5s ease 1.0s forwards;
    align-items: center;
    justify-content: center;
    min-height: 120px;
  }
  .app-tile.add-tile:hover { border-color: var(--accent); }
  .add-icon {
    width: 28px; height: 28px;
    border: 1.5px solid var(--dim);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--dim);
    font-size: 18px;
    font-weight: 300;
    transition: border-color 0.2s, color 0.2s;
  }
  .app-tile.add-tile:hover .add-icon { border-color: var(--accent); color: var(--accent); }
  .add-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 8px;
    transition: color 0.2s;
  }
  .app-tile.add-tile:hover .add-label { color: var(--accent); }

  /* tile parts */
  .tile-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }

  .tile-body { flex: 1; }

  .tile-name {
    font-family: 'Cormorant', serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .tile-desc {
    font-size: 9px;
    letter-spacing: 1.2px;
    color: var(--sub);
    text-transform: uppercase;
    line-height: 1.5;
  }

  .tile-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .tile-tag {
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid;
  }

  .tile-arrow {
    color: var(--dim);
    font-size: 14px;
    transition: color 0.2s, transform 0.2s;
  }
  .app-tile:hover .tile-arrow { color: var(--accent); transform: translateX(3px); }

  /* color variants */
  .icon-green  { background: rgba(76,175,125,0.12); color: var(--green); }
  .icon-blue   { background: rgba(91,155,213,0.12); color: var(--blue); }
  .icon-amber  { background: rgba(212,147,58,0.12); color: var(--amber); }
  .icon-rose   { background: rgba(196,107,107,0.12); color: var(--rose); }
  .icon-accent { background: var(--accent-dim); color: var(--accent); }

  .tag-green  { color: var(--green);  border-color: rgba(76,175,125,0.3);  background: rgba(76,175,125,0.07); }
  .tag-blue   { color: var(--blue);   border-color: rgba(91,155,213,0.3);  background: rgba(91,155,213,0.07); }
  .tag-amber  { color: var(--amber);  border-color: rgba(212,147,58,0.3);  background: rgba(212,147,58,0.07); }
  .tag-rose   { color: var(--rose);   border-color: rgba(196,107,107,0.3); background: rgba(196,107,107,0.07); }
  .tag-accent { color: var(--accent); border-color: rgba(200,184,154,0.3); background: var(--accent-dim); }

  /* ── FOOTER ── */
  footer {
    padding: 32px 32px calc(32px + env(safe-area-inset-bottom, 0px));
    display: flex;
    align-items: center;
    justify-content: space-between;
    opacity: 0;
    animation: fadeIn 0.5s ease 1.1s forwards;
  }

  .footer-text {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
  }

  .footer-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2.5s ease-in-out infinite;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── MOBILE TWEAKS ── */
  @media (max-width: 400px) {
    header { padding: 44px 20px 0; }
    .monogram { font-size: 60px; }
    .rule { margin: 24px 20px 0; }
    .section-label { padding: 20px 20px 14px; }
    .app-grid { padding: 0 12px; gap: 10px; }
    footer { padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px)); }
  }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="monogram">JG</div>
    <div class="header-right">
      <div class="date-line" id="dateLine"></div>
      <div class="tagline">Personal Hub</div>
    </div>
  </header>

  <div class="rule"></div>
  <div class="section-label">Applications</div>

  <div class="app-grid">

    <!-- ── APP 1: Weekly Status Dashboard ── -->
    <a class="app-tile" href="weekly_status_dashboard (5).html">
      <div class="tile-icon icon-blue">📊</div>
      <div class="tile-body">
        <div class="tile-name">Status Dashboard</div>
        <div class="tile-desc">Weekly media campaigns</div>
      </div>
      <div class="tile-footer">
        <span class="tile-tag tag-blue">Active</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ── ADD MORE APPS HERE ── -->
    <!-- Copy the block above and update href, icon, name, desc, and tag color -->

    <!-- Placeholder tile -->
    <div class="app-tile add-tile">
      <div class="add-icon">+</div>
      <div class="add-label">Add App</div>
    </div>

  </div>

  <footer>
    <span class="footer-text">JG · Personal Hub</span>
    <div class="footer-dot"></div>
  </footer>

</div>

<script>
  // Live date
  const d = new Date();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('dateLine').textContent =
    `${days[d.getDay()]} · ${months[d.getMonth()]} ${d.getDate()} · ${d.getFullYear()}`;
</script>
</body>
</html>
